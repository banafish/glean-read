spring:
  application:
    name: glean-read-server
  datasource:
    url: jdbc:postgresql://localhost:5432/gleanread
    username: postgres
    password: 123456
    driver-class-name: org.postgresql.Driver
  ai:
    openai:
      base-url: https://api.deepseek.com
      api-key: ${DEEPSEEK_API_KEY:sk-placeholder}
      chat:
        options:
          model: deepseek-chat

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true

# GleanRead AI 配置
# provider: mock    → 使用本地 Mock 适配器（默认，无需 API Key）
# provider: deepseek → 使用 DeepSeek 真实模型
gleanread:
  ai:
    provider: mock
